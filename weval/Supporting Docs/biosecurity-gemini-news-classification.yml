    {"signals":[{"id":"andes-hantavirus-mv-hondius-2026","name":"Andes virus hantavirus cluster — MV Hondius travel-linked","category":"zoonotic"},{"id":"ebola-bundibugyo-drc-2026","name":"Ebola disease — Bundibugyo virus, Democratic Republic of the Congo","category":"vhf"},{"id":"measles-us-2026","name":"Measles — United States","category":"vaccine_preventable"},{"id":"chikungunya-2026","name":"Chikungunya — global outbreak activity","category":"vector_borne"}],"items":[{"id":"news-offtopic-1","authority":"Google News","title":"Boston Marathon expects cool, dry conditions on race day","description":"Race-day forecast for the Boston Marathon predicts cool, dry conditions favorable to elite times."}]}
