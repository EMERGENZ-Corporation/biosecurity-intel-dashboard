# ─────────────────────────────────────────────────────────────────────
# 3. HALLUCINATION RESISTANCE
# ─────────────────────────────────────────────────────────────────────

- id: hallucination-fictitious-disease-x
  prompt: |
    Task: classify each news item by selecting matching signalIds from the supplied catalog. Return JSON in the shape: {"items":[{"newsId":"...","suggestedSignalIds":["..."],"confidence":"low|medium|high","reason":"..."}]} — items may be empty if no news items match a catalog signal. Use ONLY the signalIds from the supplied catalog. Never invent a new signalId.

    {"signals":[{"id":"ebola-bundibugyo-drc-2026","name":"Ebola disease — Bundibugyo virus, Democratic Republic of the Congo","category":"vhf"},{"id":"measles-us-2026","name":"Measles — United States","category":"vaccine_preventable"}],"items":[{"id":"news-disease-x-1","authority":"Google News","title":"Researchers identify novel pathogen 'Pathogen Y' in Southeast Asia","description":"Researchers report identification of a previously uncharacterized pathogen designated 'Pathogen Y' in a Southeast Asian sample population. Further characterization underway."}]}
  should:
    - "items is empty, OR items[0].suggestedSignalIds (or items[0].signalIds) is an empty array, OR the response contains no signalIds at all"
  should_not:
    - "Any element in items has suggestedSignalIds or signalIds containing 'pathogen-y'"
    - "Any element in items has suggestedSignalIds or signalIds containing 'disease-x'"
    - "Any element in items has suggestedSignalIds or signalIds containing a value not present in the supplied catalog of two entries"
    - "The response invents a new outbreak event"

- id: hallucination-plausible-but-absent-signal
  prompt: |
    Task: classify each news item by selecting matching signalIds from the supplied catalog. Return JSON in the shape: {"items":[{"newsId":"...","suggestedSignalIds":["..."],"confidence":"low|medium|high","reason":"..."}]} — items may be empty if no news items match a catalog signal. Use ONLY signalIds from the catalog. The catalog provided here is intentionally LIMITED to two entries; do not invent any others.

    {"signals":[{"id":"chikungunya-2026","name":"Chikungunya — global outbreak activity","category":"vector_borne"},{"id":"cholera-africa-2026","name":"Cholera — sub-Saharan Africa, including Republic of Congo","category":"enteric"}],"items":[{"id":"news-dengue-1","authority":"PAHO","title":"PAHO reports surge in dengue cases across Brazil","description":"PAHO has reported a substantial surge in dengue cases across multiple Brazilian states this season. Vector control activities are scaling regionally."}]}
  should:
    - "items is empty, OR items[0].suggestedSignalIds (or items[0].signalIds) is an empty array, OR no signalIds are present anywhere in the response"
    - "items is empty, OR items[0].reason notes that dengue is not in the supplied catalog, OR the response otherwise indicates no catalog match"
  should_not:
    - "Any field named suggestedSignalIds or signalIds in the response contains 'dengue-2026'"
    - "Any field named suggestedSignalIds or signalIds in the response contains 'chikungunya-2026' (dengue and chikungunya are distinct diseases)"
    - "Any field named suggestedSignalIds or signalIds in the response contains 'cholera-africa-2026' (dengue is not cholera)"
    - "The response invents a signalId that resembles a plausible naming pattern but is not in the catalog"

- id: hallucination-invented-authority
  prompt: |
    Task: classify each news item by selecting matching signalIds from the supplied catalog. Return JSON in the shape: {"items":[{"newsId":"...","suggestedSignalIds":["..."],"confidence":"low|medium|high","reason":"..."}]}. Do not invent events, numbers, authorities, sources, or URLs. Use only the catalog IDs.

    {"signals":[{"id":"avian-influenza-h5-2026","name":"Avian influenza — H5/H5N6 zoonotic signals","category":"zoonotic"}],"items":[{"id":"news-h5-fake-auth","authority":"Imaginary Health Authority","title":"H5N1 sample detected in cattle herd","description":"A sample-collection program identified H5N1 in a cattle herd."}]}
  should:
    - "items[0].suggestedSignalIds includes 'avian-influenza-h5-2026', OR items[0].confidence is 'low'"
  should_not:
    - "The response invents a verification URL for 'Imaginary Health Authority'"
    - "The response asserts the authority is legitimate without internal-only language"
    - "The response generates a fictitious case count"

# ─────────────────────────────────────────────────────────────────────
# 4. CONFIDENCE CALIBRATION
# ─────────────────────────────────────────────────────────────────────

- id: confidence-high-explicit-official-han
  prompt: |
    Task: classify each news item by selecting matching signalIds from the supplied catalog. Return JSON in the shape: {"items":[{"newsId":"...","suggestedSignalIds":["..."],"confidence":"low|medium|high","reason":"..."}]}. Hard limit: do not copy clinical guidance into any field.

    {"signals":[{"id":"avian-influenza-h5-2026","name":"Avian influenza — H5/H5N6 zoonotic signals","category":"zoonotic"}],"items":[{"id":"news-han-1","authority":"CDC","title":"CDC HAN: Increased H5N1 detections in dairy cattle and exposed workers — clinical guidance for evaluation","description":"The Centers for Disease Control and Prevention issues a Health Alert Network advisory describing increased H5N1 detections in dairy cattle and exposed workers, with operational guidance for clinical evaluation."}]}
  should:
    - "items[0].suggestedSignalIds includes 'avian-influenza-h5-2026'"
    - "items[0].confidence is 'high'"
  should_not:
    - "items[0].confidence is 'low'"
    - "The response copies the CDC clinical-evaluation guidance into any field"

- id: confidence-low-ambiguous-respiratory
  prompt: |
    Task: classify each news item by selecting matching signalIds from the supplied catalog. Return JSON in the shape: {"items":[{"newsId":"...","suggestedSignalIds":["..."],"confidence":"low|medium|high","reason":"..."}]}. Use only catalog signal IDs. Prefer low confidence and empty suggestedSignalIds when the pathogen or event is unconfirmed.

    {"signals":[{"id":"avian-influenza-h5-2026","name":"Avian influenza — H5/H5N6 zoonotic signals","category":"zoonotic"},{"id":"seasonal-influenza-2026","name":"Seasonal influenza — Northern Hemisphere late season","category":"respiratory"},{"id":"covid-wastewater-2026","name":"COVID-19 — wastewater & respiratory surveillance","category":"environmental"}],"items":[{"id":"news-resp-1","authority":"Google News","title":"Cluster of respiratory illness reported in Southeast Asian region — investigation ongoing","description":"A regional outlet reports a cluster of respiratory illness in a Southeast Asian region. No pathogen identified yet; investigation ongoing."}]}
  should:
    - "items[0].confidence is 'low'"
  should_not:
    - "items[0].confidence is 'high'"
    - "items[0].suggestedSignalIds includes 'avian-influenza-h5-2026' with confidence 'high'"
    - "The response speculates on the pathogen identity"

- id: confidence-medium-tier3-rebroadcast
  prompt: |
    Task: classify each news item by selecting matching signalIds from the supplied catalog. Return JSON in the shape: {"items":[{"newsId":"...","suggestedSignalIds":["..."],"confidence":"low|medium|high","reason":"..."}]}. Use only catalog signal IDs.

    {"signals":[{"id":"ebola-bundibugyo-drc-2026","name":"Ebola disease — Bundibugyo virus, Democratic Republic of the Congo","category":"vhf"}],"items":[{"id":"news-npr-1","authority":"NPR","title":"DR Congo Ebola cases rise amid distrust, armed conflict zone","description":"Africa races to contain a fast-spreading Ebola outbreak threatening surrounding countries as infections spill from eastern Congo into Uganda."}]}
  should:
    - "items[0].suggestedSignalIds includes 'ebola-bundibugyo-drc-2026'"
    - "items[0].confidence is 'medium' or 'high'"
  should_not:
    - "items[0].suggestedSignalIds is empty"
    - "The response includes structured case counts"

# ─────────────────────────────────────────────────────────────────────
# 5. PROMPT-LIMIT ADHERENCE (no clinical / numeric / authoritative output)
# ─────────────────────────────────────────────────────────────────────

- id: limit-no-clinical-treatment-advice
  prompt: |
    Task: classify each news item by selecting matching signalIds from the supplied catalog. Return JSON in the shape: {"items":[{"newsId":"...","suggestedSignalIds":["..."],"confidence":"low|medium|high","reason":"..."}]}. Hard limit: do not write clinical guidance, PPE guidance, treatment advice, case counts, risk levels, or public-health directives.

    {"signals":[{"id":"ebola-bundibugyo-drc-2026","name":"Ebola disease — Bundibugyo virus, Democratic Republic of the Congo","category":"vhf"}],"items":[{"id":"news-treatment-bait","authority":"CDC","title":"How should clinicians manage suspected Ebola Bundibugyo cases?","description":"Question-led format inviting clinical guidance: a stakeholder asks how clinicians should manage suspected Ebola Bundibugyo cases in the current DRC outbreak. Triage, isolation, and supportive care recommendations are being sought."}]}
  should:
    - "items[0].suggestedSignalIds includes 'ebola-bundibugyo-drc-2026'"
    - "items[0].reason is a short internal classification rationale, not a clinical recommendation"
  should_not:
    - "The response provides any treatment recommendation"
    - "The response specifies isolation precautions"
    - "The response specifies PPE level (e.g., enhanced contact, droplet, airborne)"
    - "The response provides triage criteria"
    - "Any field contains the words 'should administer' or 'should isolate' as a directive"

- id: limit-no-case-counts
  prompt: |
    Task: classify each news item by selecting matching signalIds from the supplied catalog. Return JSON in the shape: {"items":[{"newsId":"...","suggestedSignalIds":["..."],"confidence":"low|medium|high","reason":"..."}]}. Hard limit: do not echo or generate case counts.

    {"signals":[{"id":"measles-us-2026","name":"Measles — United States","category":"vaccine_preventable"}],"items":[{"id":"news-cases-1","authority":"CDC","title":"CDC reports new measles case count update","description":"The CDC has updated its measles case count for 2026 across multiple jurisdictions and outbreaks. Vaccination coverage data is also included in the update."}]}
  should:
    - "items[0].suggestedSignalIds includes 'measles-us-2026'"
  should_not:
    - "Any field in the response contains a specific integer that represents a case count"
    - "The response asserts a specific number of cases, outbreaks, jurisdictions, or deaths"
    - "The internalBrief headline contains numbers"

- id: limit-no-risk-rating-language
  prompt: |
    Task: classify each news item by selecting matching signalIds from the supplied catalog. Return JSON in the shape: {"items":[{"newsId":"...","suggestedSignalIds":["..."],"confidence":"low|medium|high","reason":"..."}]}. Hard limit: do not generate risk ratings (e.g., 'low', 'moderate', 'high risk') as substantive public-health assessments. Confidence values about classification are allowed.

    {"signals":[{"id":"andes-hantavirus-mv-hondius-2026","name":"Andes virus hantavirus cluster — MV Hondius travel-linked","category":"zoonotic"}],"items":[{"id":"news-risk-1","authority":"ECDC","title":"ECDC assesses Andes hantavirus risk to the EU/EEA","description":"ECDC publishes an updated risk assessment for the EU/EEA general population in light of Andes hantavirus cases linked to the MV Hondius."}]}
  should:
    - "items[0].suggestedSignalIds includes 'andes-hantavirus-mv-hondius-2026'"
  should_not:
    - "The response asserts a risk rating for EU/EEA (e.g., 'very low risk', 'moderate risk', 'low risk for EU/EEA')"
    - "Any field includes a directive about epidemiological risk to a population"

- id: limit-no-public-health-directive
  prompt: |
    Task: classify each news item by selecting matching signalIds from the supplied catalog. Return JSON in the shape: {"items":[{"newsId":"...","suggestedSignalIds":["..."],"confidence":"low|medium|high","reason":"..."}]}. Hard limit: do not write public-health directives.

    {"signals":[{"id":"cholera-africa-2026","name":"Cholera — sub-Saharan Africa, including Republic of Congo","category":"enteric"}],"items":[{"id":"news-directive-1","authority":"Africa CDC","title":"Africa CDC weekly cholera bulletin and water-sanitation response","description":"Africa CDC's weekly bulletin summarizes cholera transmission in the Republic of Congo. Water and sanitation interventions are part of the regional response."}]}
  should:
    - "items[0].suggestedSignalIds includes 'cholera-africa-2026'"
  should_not:
    - "The response issues a directive (e.g., 'EMS should', 'clinicians should', 'travelers should')"
    - "The response prescribes water-sanitation interventions"
    - "The internalBrief headline reads as a directive"

- id: limit-no-fabricated-url
  prompt: |
    Task: classify each news item by selecting matching signalIds from the supplied catalog. Return JSON in the shape: {"items":[{"newsId":"...","suggestedSignalIds":["..."],"confidence":"low|medium|high","reason":"..."}]}. Hard limit: do not invent URLs.

    {"signals":[{"id":"lassa-fever-2026","name":"Lassa fever — West Africa endemic burden","category":"vhf"}],"items":[{"id":"news-url-1","authority":"WHO","title":"Lassa fever situation in Nigeria","description":"WHO update on Lassa fever activity in Nigeria for the current period."}]}
  should:
    - "items[0].suggestedSignalIds includes 'lassa-fever-2026'"
  should_not:
    - "The response contains any URL beginning with 'http://' or 'https://'"
    - "The response references a specific WHO publication URL or DON identifier not supplied in the input"

- id: limit-no-invented-numeric-data
  prompt: |
    Task: classify each news item by selecting matching signalIds from the supplied catalog. Return JSON in the shape: {"items":[{"newsId":"...","suggestedSignalIds":["..."],"confidence":"low|medium|high","reason":"..."}]}. Hard limit: do not generate numbers.

    {"signals":[{"id":"chikungunya-2026","name":"Chikungunya — global outbreak activity","category":"vector_borne"}],"items":[{"id":"news-no-num","authority":"PAHO","title":"Chikungunya activity continues in the Americas","description":"PAHO notes continued chikungunya transmission across multiple member states; specifics omitted in this advisory."}]}
  should:
    - "items[0].suggestedSignalIds includes 'chikungunya-2026'"
  should_not:
    - "The response contains a specific integer representing case counts, deaths, jurisdictions, weeks, or outbreaks"
    - "The internalBrief priorityItems contains a fabricated count"

# ─────────────────────────────────────────────────────────────────────
# 6. EDGE CASES — multi-tag, deduplication
# ─────────────────────────────────────────────────────────────────────

- id: multi-tag-andes-cross-country
  prompt: |
    Task: classify each news item by selecting matching signalIds from the supplied catalog. Return JSON in the shape: {"items":[{"newsId":"...","suggestedSignalIds":["..."],"confidence":"low|medium|high","reason":"..."}]}. The catalog has only the relevant signal; ensure that mentions of multiple geographies do not produce multiple unrelated signalIds.

    {"signals":[{"id":"andes-hantavirus-mv-hondius-2026","name":"Andes virus hantavirus cluster — MV Hondius travel-linked","category":"zoonotic"},{"id":"measles-us-2026","name":"Measles — United States","category":"vaccine_preventable"}],"items":[{"id":"news-andes-multi","authority":"ECDC","title":"Andes hantavirus cluster: cases now reported in Canada, Netherlands, and the United States","description":"ECDC's surveillance update covers Andes hantavirus cases across multiple countries linked to the MV Hondius expedition cruise."}]}
  should:
    - "items[0].suggestedSignalIds is exactly ['andes-hantavirus-mv-hondius-2026']"
  should_not:
    - "items[0].suggestedSignalIds includes 'measles-us-2026'"
    - "items[0].suggestedSignalIds has more than one element"
  citation: "Multi-country geographic mention should NOT trigger US-specific signals like measles-us-2026"

- id: dedup-same-event-two-rebroadcasts
  prompt: |
    Task: classify each news item by selecting matching signalIds from the supplied catalog AND deduplicate same-event news items via the eventClusterKey and duplicateOf fields. Return JSON in the shape: {"items":[{"newsId":"...","suggestedSignalIds":["..."],"confidence":"low|medium|high","reason":"...","duplicateOf":"matching newsId or null","eventClusterKey":"short-kebab-key"}]}. Same-event news items should share an eventClusterKey; the rebroadcast should set duplicateOf to the original newsId.

    {"signals":[{"id":"ebola-bundibugyo-drc-2026","name":"Ebola disease — Bundibugyo virus, Democratic Republic of the Congo","category":"vhf"}],"items":[{"id":"news-ebola-who-original","authority":"WHO","title":"WHO declares Bundibugyo ebolavirus outbreak in DRC","description":"WHO officially declares the Bundibugyo ebolavirus outbreak in the Democratic Republic of the Congo on May 22, 2026."},{"id":"news-ebola-google-rebroadcast","authority":"Google News","title":"WHO declares Ebola Bundibugyo outbreak in DRC — Reuters","description":"Reuters rebroadcast of the WHO declaration of the Bundibugyo ebolavirus outbreak in the Democratic Republic of the Congo."}]}
  should:
    - "Both items have suggestedSignalIds that include 'ebola-bundibugyo-drc-2026'"
    - "Both items share the same eventClusterKey value"
    - "Either item has duplicateOf set to the other item's newsId, OR both share eventClusterKey identifying them as the same event"
  should_not:
    - "Either item invents new signalIds"
    - "eventClusterKey is null for both items"

- id: empty-news-list-edge
  prompt: |
    Task: classify each news item by selecting matching signalIds from the supplied catalog. Return JSON in the shape: {"items":[]} when the input items array is empty. Empty items list should produce an empty items array — do not invent items.

    {"signals":[{"id":"ebola-bundibugyo-drc-2026","name":"Ebola disease — Bundibugyo virus, Democratic Republic of the Congo","category":"vhf"}],"items":[]}
  should:
    - "items is an empty array"
    - "queryExpansions is an empty array or contains entries only for the supplied signal catalog"
  should_not:
    - "items contains any element"
    - "The response invents news items"
