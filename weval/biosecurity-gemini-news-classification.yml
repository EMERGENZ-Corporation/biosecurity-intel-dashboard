- id: negative-mentions-disease-not-active-signal
  prompt: |
    Return JSON. Use only supplied catalog IDs. Prefer empty arrays when the news topic does not match any catalog signal.

    {"signals":[{"id":"ebola-bundibugyo-drc-2026","name":"Ebola disease — Bundibugyo virus, Democratic Republic of the Congo","category":"vhf"},{"id":"measles-us-2026","name":"Measles — United States","category":"vaccine_preventable"},{"id":"chikungunya-2026","name":"Chikungunya — global outbreak activity","category":"vector_borne"}],"items":[{"id":"news-historical-1","authority":"Google News","title":"Historical retrospective: 1976 first identification of Ebolavirus in Zaire","description":"A medical-history outlet publishes a retrospective on the first identification of Ebolavirus in 1976 Zaire, with no current outbreak content."}]}
