- id: negative-marathon-weather
  prompt: |
    Task: classify each news item by selecting matching signalIds from the supplied catalog. Return JSON in the shape: {"items":[{"newsId":"...","suggestedSignalIds":["..."],"confidence":"low|medium|high","reason":"..."}]} — items may be empty if no news items are relevant to any catalog signal. Hard limit: prefer empty arrays when uncertain. Only use catalog IDs.

    {"signals":[{"id":"andes-hantavirus-mv-hondius-2026","name":"Andes virus hantavirus cluster — MV Hondius travel-linked","category":"zoonotic"},{"id":"ebola-bundibugyo-drc-2026","name":"Ebola disease — Bundibugyo virus, Democratic Republic of the Congo","category":"vhf"},{"id":"measles-us-2026","name":"Measles — United States","category":"vaccine_preventable"},{"id":"chikungunya-2026","name":"Chikungunya — global outbreak activity","category":"vector_borne"}],"items":[{"id":"news-offtopic-1","authority":"Google News","title":"Boston Marathon expects cool, dry conditions on race day","description":"Race-day forecast for the Boston Marathon predicts cool, dry conditions favorable to elite times."}]}
  should:
    - "The response assigns no biosecurity signal IDs — either items is an empty array, or every element in items has an empty suggestedSignalIds/signalIds array, or no signalIds field appears anywhere"
  should_not:
    - "Any field named suggestedSignalIds or signalIds in the response contains any catalog signal ID"
    - "The response assigns a biosecurity signal to a weather or sporting-event news item"

