name: Automated Data Update

on:
  schedule:
    # Every 6 hours — increased from 12h to reduce timing gaps during active outbreak
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    # Allow manual trigger from the GitHub Actions tab

permissions:
  contents: write   # needed to commit updated JSON files back to main
  issues: write     # needed to create failure-alert issues

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run data update script
        run: node scripts/update-data.mjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BRIGHT_DATA_API_KEY: ${{ secrets.BRIGHT_DATA_API_KEY }}
          BRIGHT_DATA_ZONE: ${{ secrets.BRIGHT_DATA_ZONE }}

      - name: Alert on pipeline failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = `[PIPELINE ALERT] Data update failed — ${new Date().toUTCString()}`
            const body = [
              '## ⚠ Automated data pipeline failure',
              '',
              `**Workflow:** ${context.workflow}`,
              `**Run:** [${context.runNumber}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              `**Commit:** \`${context.sha.slice(0, 7)}\``,
              `**Time:** ${new Date().toUTCString()}`,
              '',
              `Check the [Actions log](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
              '',
              '_Auto-generated by the EMERGENZ data pipeline. Close this issue once resolved._',
            ].join('\n')
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['pipeline-failure'],
            })

      - name: Commit updated data files
        run: |
          git config user.name "EMERGENZ Data Bot"
          git config user.email "bot@emergenz.org"
          # Pull before staging — prevents commit-then-rebase race condition
          git pull --rebase origin main
          git add src/data/meta.json src/data/timeline.json src/data/news.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(data): automated update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
