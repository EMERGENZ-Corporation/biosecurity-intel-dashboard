name: Automated Data Update

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/update-data.yml'
  schedule:
    # Every 6 hours UTC during active outbreak monitoring.
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run data update script
        run: node scripts/update-data.mjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BRIGHT_DATA_API_KEY: ${{ secrets.BRIGHT_DATA_API_KEY }}
          BRIGHT_DATA_ZONE: ${{ secrets.BRIGHT_DATA_ZONE }}

      - name: Validate data files
        run: npm run validate:data

      - name: Commit updated data files
        run: |
          git config user.name "EMERGENZ Data Bot"
          git config user.email "bot@emergenz.org"
          git add src/data/meta.json src/data/timeline.json src/data/news.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(data): automated update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase origin main
            git push
          fi

      - name: Alert on pipeline failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- emergenz-pipeline-failure -->'
            const title = '[PIPELINE ALERT] Data update failing'
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const body = [
              marker,
              '## Automated data pipeline failure',
              '',
              `**Workflow:** ${context.workflow}`,
              `**Latest failed run:** [${context.runNumber}](${runUrl})`,
              `**Commit:** \`${context.sha.slice(0, 7)}\``,
              `**Time:** ${new Date().toUTCString()}`,
              '',
              `Check the [Actions log](${runUrl}) for details.`,
              '',
              '_Auto-generated by the EMERGENZ data pipeline. This issue is reused to prevent alert spam._',
            ].join('\n')

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'pipeline-failure',
              per_page: 20,
            })
            const existing = issues.find((issue) =>
              issue.title === title || issue.body?.includes(marker)
            )

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: [
                  `Another scheduled run failed: [${context.runNumber}](${runUrl})`,
                  `Commit: \`${context.sha.slice(0, 7)}\``,
                  `Time: ${new Date().toUTCString()}`,
                ].join('\n'),
              })
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['pipeline-failure'],
              })
            }
