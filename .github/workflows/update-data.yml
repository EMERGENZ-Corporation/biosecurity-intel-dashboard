name: Automated Data Update

on:
  schedule:
    # Every 12 hours at 06:00 and 18:00 UTC
    - cron: '0 6,18 * * *'
  workflow_dispatch:
    # Allow manual trigger from the GitHub Actions tab

permissions:
  contents: write   # needed to commit updated JSON files back to main

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run data update script
        run: node scripts/update-data.mjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BRIGHT_DATA_API_KEY: ${{ secrets.BRIGHT_DATA_API_KEY }}
          BRIGHT_DATA_ZONE: ${{ secrets.BRIGHT_DATA_ZONE }}

      - name: Commit updated data files
        run: |
          git config user.name "EMERGENZ Data Bot"
          git config user.email "bot@emergenz.org"
          git add src/data/meta.json src/data/timeline.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(data): automated update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
