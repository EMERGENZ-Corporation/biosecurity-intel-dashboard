name: Status Refresh

on:
  schedule:
    # Refresh the public status contract daily. The signal data itself is
    # currently maintained by hand against primary sources; richer
    # source-specific extractors can be wired in here without changing
    # the contract.
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/data/signals.json'
      - 'src/data/signal-timeline.json'
      - 'src/data/signal-sources.json'

# Shared concurrency group with Update News Feed — both write to public/api/v1/
# so they must not run in parallel. cancel-in-progress: false ensures the
# queued run still executes rather than being dropped.
concurrency:
  group: biosecurity-data-writers
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate signal data
        run: npm run validate:data

      - name: Regenerate status.json
        run: npm run generate:status

      - name: Regenerate public API endpoints
        run: npm run generate:api

      - name: Re-validate after regeneration
        run: npm run validate:data

      - name: Commit refreshed status.json
        id: commit-status
        run: |
          git config user.name "EMERGENZ Data Bot"
          git config user.email "bot@emergenz.org"
          git add public/status.json public/api/v1/
          if git diff --staged --quiet; then
            echo "No status changes to commit."
            echo "data_changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(status): refresh $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            # Rebase onto latest origin. -X theirs resolves any conflict on generated
            # files (public/api/v1/, public/status.json) by taking the remote version;
            # we regenerate immediately after, so the final committed state correctly
            # blends both the status refresh and any concurrent news-feed changes.
            git pull --rebase -X theirs origin main || {
              echo "Rebase failed — aborting."
              git rebase --abort 2>/dev/null || true
              exit 1
            }
            # Re-run API generation after rebase so public/api/v1/ reflects the
            # merged state of both signal/status changes and any news changes from main.
            node scripts/generate-api.mjs
            git add public/api/v1/
            git diff --staged --quiet || git commit --amend --no-edit
            # Push with rebase-and-retry: handles concurrent news-feed writes to
            # public/api/v1/. On push rejection, rebase onto latest origin/main and
            # regenerate the API so we push a consistent state.
            pushed=false
            for attempt in 1 2 3 4 5; do
              if git push; then
                pushed=true
                echo "Push succeeded on attempt $attempt."
                echo "data_changed=true" >> "$GITHUB_OUTPUT"
                break
              fi
              echo "Push rejected (attempt $attempt/5). Retrying in $((attempt * 3))s..."
              sleep $((attempt * 3))
              git pull --rebase -X theirs origin main || {
                echo "Rebase conflict on retry $attempt — aborting."
                git rebase --abort 2>/dev/null || true
                exit 1
              }
              node scripts/generate-api.mjs
              git add public/api/v1/
              git diff --staged --quiet || git commit --amend --no-edit
            done
            if [ "$pushed" = false ]; then
              echo "All push attempts failed after 5 retries."
              exit 1
            fi
          fi

      - name: Verify production deployment
        if: steps.commit-status.outputs.data_changed == 'true'
        run: npm run verify:production
        env:
          PRODUCTION_URL: https://biosecurity-intel.emergenzsystems.org
          VERIFY_PRODUCTION_ATTEMPTS: 16
          VERIFY_PRODUCTION_DELAY_MS: 30000
          MAX_OFFICIAL_CHECK_AGE_HOURS: 336

      - name: Alert on stale dashboard data
        if: success()
        uses: actions/github-script@v8
        env:
          MAX_DATA_AGE_HOURS: 336
          MAX_OFFICIAL_CHECK_AGE_HOURS: 336
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs')
            const status = JSON.parse(fs.readFileSync('public/status.json', 'utf8'))
            const marker = '<!-- emergenz-stale-data -->'
            const title = '[STALE DATA] Biosecurity dashboard signals are aging out of policy'
            const reasons = status.staleReasons ?? []

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'stale-data',
              per_page: 20,
            })
            const existing = issues.find((issue) =>
              issue.title === title || issue.body?.includes(marker)
            )

            if (reasons.length === 0) {
              if (existing) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  body: `Stale-data state cleared at \`${status.generatedAt}\`.`,
                })
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  state: 'closed',
                })
              }
              return
            }

            const body = [
              marker,
              '## Biosecurity dashboard signals are stale',
              '',
              ...reasons.map((reason) => `- ${reason}`),
              '',
              `Generated at: \`${status.generatedAt}\``,
              `Active signals: ${status.signals?.active ?? 'unknown'}/${status.signals?.total ?? 'unknown'}`,
              `Highest severity: ${status.signals?.highestSeverity ?? 'unknown'}`,
              `Stale signal ids: ${(status.signals?.staleSignalIds ?? []).join(', ') || 'none'}`,
            ].join('\n')

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              })
            } else {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'stale-data',
                  color: 'D29922',
                  description: 'Signal data has aged beyond policy thresholds',
                })
              } catch (error) {
                if (error.status !== 422) throw error
              }
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['stale-data'],
              })
            }
