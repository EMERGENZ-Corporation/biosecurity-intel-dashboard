name: Production Status Monitor

on:
  schedule:
    # Hourly independent check of the deployed status contract.
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check production status endpoint
        id: check-status
        continue-on-error: true
        run: npm run monitor:status
        env:
          STATUS_URL: https://biosecurity-intel.emergenzsystems.org/status.json
          MAX_STATUS_GENERATED_AGE_HOURS: 8

      - name: Reconcile status monitor issue
        uses: actions/github-script@v8
        env:
          CHECK_OUTCOME: ${{ steps.check-status.outcome }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs')
            const marker = '<!-- emergenz-status-monitor -->'
            const title = '[STATUS ALERT] Production dashboard status unhealthy'
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const result = JSON.parse(fs.readFileSync('status-monitor-result.json', 'utf8'))

            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'status-monitor',
                color: 'B60205',
                description: 'Production status endpoint health alert',
              })
            } catch (error) {
              if (error.status !== 422) throw error
            }

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'status-monitor',
              per_page: 20,
            })
            const existing = issues.find((issue) =>
              issue.title === title || issue.body?.includes(marker)
            )

            if (result.ok) {
              if (existing) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  body: [
                    'Production status recovered.',
                    `Checked at: \`${result.checkedAt}\``,
                    `Status URL: ${result.statusUrl}`,
                    `Run: ${runUrl}`,
                  ].join('\n'),
                })
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  state: 'closed',
                })
              }
              return
            }

            const body = [
              marker,
              '## Production status monitor alert',
              '',
              ...result.failures.map((failure) => `- ${failure}`),
              '',
              `Status URL: ${result.statusUrl}`,
              `Status: \`${result.status}\``,
              `Generated at: \`${result.generatedAt || 'unknown'}\``,
              `Data updated: \`${result.lastUpdated || 'unknown'}\``,
              `Last checked: \`${result.lastChecked || 'unknown'}\``,
              `Official sources checked: \`${result.lastOfficialSourceCheck || 'unknown'}\``,
              `Workflow outcome: \`${process.env.CHECK_OUTCOME}\``,
              '',
              `Run: ${runUrl}`,
              '',
              '_Auto-generated by the EMERGENZ production status monitor. This issue is reused to prevent alert spam._',
            ].join('\n')

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              })
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['status-monitor'],
              })
            }

      - name: Fail workflow when status is unhealthy
        if: steps.check-status.outcome != 'success'
        run: exit 1
