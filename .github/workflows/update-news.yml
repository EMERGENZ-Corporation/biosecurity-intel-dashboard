name: Update News Feed

on:
  schedule:
    # Fetch news every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/data/signals.json'
      - 'scripts/update-news.mjs'

# Prevent concurrent data-writing workflows from colliding on public/api/v1/.
# Status Refresh and Update News Feed both commit to that directory; this group
# queues them so only one writer runs at a time.
concurrency:
  group: biosecurity-data-writers
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch and update news feed
        id: update-news
        continue-on-error: true
        run: npm run update:news
        env:
          MAX_NEWS_ITEMS: 500
          MAX_NEWS_AGE_DAYS: 30

      - name: Run Gemini/Bright Data news enrichment
        id: enrich-news
        if: steps.update-news.outcome == 'success'
        continue-on-error: true
        run: npm run enrich:news
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          GEMINI_NEWS_ENRICHMENT: ${{ vars.GEMINI_NEWS_ENRICHMENT || '1' }}
          # The script default (30s) is too tight for gemini-2.5-flash producing
          # structured JSON over ~80 news items (thinking is on by default) — it
          # aborted at ~31s on the 2026-06-10 runs. Give the call room; the step
          # is continue-on-error and the job has no tight wall-clock budget. The
          # call returns as soon as the model responds, so this is a ceiling, not
          # a fixed wait. Override via the GEMINI_NEWS_TIMEOUT_MS repo variable.
          GEMINI_NEWS_TIMEOUT_MS: ${{ vars.GEMINI_NEWS_TIMEOUT_MS || '120000' }}
          MAX_AI_NEWS_ITEMS: 80
          MAX_AI_PUBLIC_TAG_ADDS: 80
          BRIGHT_DATA_API_KEY: ${{ secrets.BRIGHT_DATA_API_KEY }}
          BRIGHT_DATA_ZONE: ${{ secrets.biosecurity_web_unlocker }}
          BRIGHT_DATA_NEWS_CONTEXT: ${{ vars.BRIGHT_DATA_NEWS_CONTEXT || '1' }}
          MAX_BRIGHT_DATA_CONTEXT_ITEMS: 5

      - name: Promote Tier 1 news to signal-timeline
        id: promote-timeline
        if: steps.update-news.outcome == 'success'
        continue-on-error: true
        run: npm run promote:timeline

      - name: Reconcile AI news brief issue
        if: steps.update-news.outcome == 'success'
        # Advisory alerting only — a transient GitHub API error here must never
        # block the news.json commit below, so this step fails soft.
        continue-on-error: true
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs')
            const marker = '<!-- emergenz-ai-news-brief -->'
            const title = '[AI BRIEF] Gemini news triage'
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`

            if (!fs.existsSync('ai-news-enrichment-result.json')) return
            const result = JSON.parse(fs.readFileSync('ai-news-enrichment-result.json', 'utf8'))
            if (!result.aiAttempted) return
            // A persistent credential/authorization denial (e.g. Gemini 403
            // PERMISSION_DENIED) repeats every run and won't self-heal, so skip
            // the per-run brief comment to avoid spamming the reusable issue.
            // The denial stays visible in the workflow run logs and the
            // ai-news-enrichment-result.json artifact. Transient failures still post.
            if (result.failureClass === 'auth-denied') return

            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'ai-news-brief',
                color: '6F42C1',
                description: 'Gemini-assisted news triage output',
              })
            } catch (error) {
              if (error.status !== 422) throw error
            }

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ai-news-brief',
              per_page: 20,
            })
            const existing = issues.find((issue) =>
              issue.title === title || issue.body?.includes(marker)
            )

            const priorityItems = result.internalBrief?.priorityItems ?? []
            const queryExpansions = result.queryExpansions ?? []
            const body = [
              marker,
              '## Gemini news triage',
              '',
              `Mode: \`${result.mode || 'unknown'}\``,
              `AI used: \`${result.aiUsed ? 'yes' : 'no'}\``,
              `Checked at: \`${result.checkedAt || 'unknown'}\``,
              `Model: \`${result.geminiModel || 'not configured'}\``,
              `News items considered: ${result.newsItemsConsidered ?? 0}`,
              `Public tag additions: ${result.publicTagAdds ?? 0}`,
              `Bright Data context pages used: ${result.brightData?.used ?? 0}`,
              '',
              '### Internal brief',
              result.internalBrief?.headline ? `- ${result.internalBrief.headline}` : '- none generated',
              '',
              '### Priority items',
              priorityItems.length
                ? priorityItems.map((item) => `- ${item.authority || 'unknown'}: ${item.title || item.newsId} ${item.link ? `(${item.link})` : ''}`).join('\n')
                : '- none',
              '',
              '### Query expansion candidates',
              queryExpansions.length
                ? queryExpansions.map((entry) => `- ${entry.signalId}: ${(entry.queries || []).join('; ')}`).join('\n')
                : '- none',
              '',
              result.reason ? `Fallback reason: \`${result.reason}\`` : '',
              `Run: ${runUrl}`,
              '',
              '_Auto-generated by the optional Gemini/Bright Data news enrichment step. AI triage is advisory and does not replace source attribution or clinical review._',
            ].filter(Boolean).join('\n')

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              })
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['ai-news-brief'],
              })
            }

      - name: Reconcile news pipeline issue
        # Advisory alerting only. The job's red/green is governed by the final
        # "Fail workflow when news update failed" gate, which keys off the
        # actual data outcome — a transient GitHub API 401 in this alerting
        # path must not fail the run or skip the commit below. (Regression
        # observed 2026-06-10 15:53Z: a one-off 401 here discarded a good
        # 500-item news fetch because the commit step was skipped.)
        continue-on-error: true
        uses: actions/github-script@v8
        env:
          UPDATE_NEWS_OUTCOME: ${{ steps.update-news.outcome }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs')
            const marker = '<!-- emergenz-news-pipeline -->'
            const title = '[PIPELINE ALERT] News feed update failed'
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const result = fs.existsSync('update-news-result.json')
              ? JSON.parse(fs.readFileSync('update-news-result.json', 'utf8'))
              : { ok: process.env.UPDATE_NEWS_OUTCOME === 'success', criticalFailures: [], softFailures: [] }

            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'news-pipeline',
                color: 'B60205',
                description: 'News feed pipeline alert',
              })
            } catch (error) {
              if (error.status !== 422) throw error
            }

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'news-pipeline',
              per_page: 20,
            })
            const existing = issues.find((issue) =>
              issue.title === title || issue.body?.includes(marker)
            )

            if (process.env.UPDATE_NEWS_OUTCOME === 'success') {
              if (existing) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  body: [
                    'News pipeline recovered.',
                    `Checked at: \`${result.checkedAt || new Date().toISOString()}\``,
                    `Run: ${runUrl}`,
                  ].join('\n'),
                })
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  state: 'closed',
                })
              }
              return
            }

            const critical = result.criticalFailures ?? []
            const soft = result.softFailures ?? []
            const body = [
              marker,
              '## News feed pipeline alert',
              '',
              `Workflow outcome: \`${process.env.UPDATE_NEWS_OUTCOME}\``,
              `Checked at: \`${result.checkedAt || 'unknown'}\``,
              `Active signals: \`${result.activeSignalCount ?? 'unknown'}\``,
              '',
              '### Critical Tier 1 failures',
              critical.length
                ? critical.map((failure) => `- ${failure.authority}: ${failure.reason} (${failure.url})`).join('\n')
                : '- none recorded',
              '',
              '### Soft failures',
              soft.length
                ? soft.map((failure) => `- ${failure.authority}: ${failure.reason} (${failure.url})`).join('\n')
                : '- none recorded',
              '',
              `Run: ${runUrl}`,
              '',
              '_Auto-generated by the EMERGENZ news feed pipeline. This issue is reused to prevent alert spam._',
            ].join('\n')

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              })
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['news-pipeline'],
              })
            }

      - name: Regenerate public API news endpoint
        if: steps.update-news.outcome == 'success'
        run: npm run generate:api

      - name: Commit updated news.json
        if: steps.update-news.outcome == 'success'
        run: |
          git config user.name "EMERGENZ Data Bot"
          git config user.email "bot@emergenz.org"
          git add src/data/news.json src/data/signal-timeline.json public/api/v1/
          if git diff --staged --quiet; then
            echo "No news changes to commit."
            exit 0
          fi
          git commit -m "chore(news): automated update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Push with rebase-and-retry: handles concurrent Status Refresh writes to
          # public/api/v1/. On push rejection, rebase onto latest origin/main and
          # regenerate the API so we push a consistent state.
          # -X theirs resolves any rebase conflict on generated files (public/api/v1/)
          # by taking the remote version; regenerating immediately after ensures the
          # final committed state correctly blends both the news update and any
          # concurrent status-refresh or signal-data changes from main.
          pushed=false
          for attempt in 1 2 3 4 5; do
            git pull --rebase -X theirs origin main || {
              echo "Rebase conflict on attempt $attempt — aborting rebase."
              git rebase --abort 2>/dev/null || true
              exit 1
            }
            # Re-run API generation after rebase so public/api/v1/ reflects the
            # merged state of both news.json and any status changes from main.
            node scripts/generate-api.mjs
            git add public/api/v1/
            git diff --staged --quiet || git commit --amend --no-edit
            if git push; then
              pushed=true
              echo "Push succeeded on attempt $attempt."
              break
            fi
            echo "Push rejected (attempt $attempt/5). Retrying in $((attempt * 3))s..."
            sleep $((attempt * 3))
          done
          if [ "$pushed" = false ]; then
            echo "All push attempts failed after 5 retries."
            exit 1
          fi

      - name: Fail workflow when news update failed
        if: steps.update-news.outcome != 'success'
        run: exit 1
