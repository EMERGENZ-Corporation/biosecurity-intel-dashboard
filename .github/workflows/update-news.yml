name: Update News Feed

on:
  schedule:
    # Fetch news every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/data/signals.json'
      - 'scripts/update-news.mjs'

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch and update news feed
        id: update-news
        continue-on-error: true
        run: npm run update:news
        env:
          MAX_NEWS_ITEMS: 500
          MAX_NEWS_AGE_DAYS: 30

      - name: Reconcile news pipeline issue
        uses: actions/github-script@v8
        env:
          UPDATE_NEWS_OUTCOME: ${{ steps.update-news.outcome }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs')
            const marker = '<!-- emergenz-news-pipeline -->'
            const title = '[PIPELINE ALERT] News feed update failed'
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const result = fs.existsSync('update-news-result.json')
              ? JSON.parse(fs.readFileSync('update-news-result.json', 'utf8'))
              : { ok: process.env.UPDATE_NEWS_OUTCOME === 'success', criticalFailures: [], softFailures: [] }

            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'news-pipeline',
                color: 'B60205',
                description: 'News feed pipeline alert',
              })
            } catch (error) {
              if (error.status !== 422) throw error
            }

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'news-pipeline',
              per_page: 20,
            })
            const existing = issues.find((issue) =>
              issue.title === title || issue.body?.includes(marker)
            )

            if (process.env.UPDATE_NEWS_OUTCOME === 'success') {
              if (existing) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  body: [
                    'News pipeline recovered.',
                    `Checked at: \`${result.checkedAt || new Date().toISOString()}\``,
                    `Run: ${runUrl}`,
                  ].join('\n'),
                })
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  state: 'closed',
                })
              }
              return
            }

            const critical = result.criticalFailures ?? []
            const soft = result.softFailures ?? []
            const body = [
              marker,
              '## News feed pipeline alert',
              '',
              `Workflow outcome: \`${process.env.UPDATE_NEWS_OUTCOME}\``,
              `Checked at: \`${result.checkedAt || 'unknown'}\``,
              `Active signals: \`${result.activeSignalCount ?? 'unknown'}\``,
              '',
              '### Critical Tier 1 failures',
              critical.length
                ? critical.map((failure) => `- ${failure.authority}: ${failure.reason} (${failure.url})`).join('\n')
                : '- none recorded',
              '',
              '### Soft failures',
              soft.length
                ? soft.map((failure) => `- ${failure.authority}: ${failure.reason} (${failure.url})`).join('\n')
                : '- none recorded',
              '',
              `Run: ${runUrl}`,
              '',
              '_Auto-generated by the EMERGENZ news feed pipeline. This issue is reused to prevent alert spam._',
            ].join('\n')

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              })
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['news-pipeline'],
              })
            }

      - name: Commit updated news.json
        if: steps.update-news.outcome == 'success'
        run: |
          git config user.name "EMERGENZ Data Bot"
          git config user.email "bot@emergenz.org"
          git add src/data/news.json
          if git diff --staged --quiet; then
            echo "No news changes to commit."
          else
            git commit -m "chore(news): automated update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase origin main
            git push
          fi

      - name: Fail workflow when news update failed
        if: steps.update-news.outcome != 'success'
        run: exit 1
