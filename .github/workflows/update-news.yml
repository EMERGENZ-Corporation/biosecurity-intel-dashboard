name: Update News Feed

on:
  schedule:
    # Fetch news every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/data/signals.json'
      - 'scripts/update-news.mjs'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch and update news feed
        run: npm run update:news
        env:
          MAX_NEWS_ITEMS: 500
          MAX_NEWS_AGE_DAYS: 30

      - name: Commit updated news.json
        run: |
          git config user.name "EMERGENZ Data Bot"
          git config user.email "bot@emergenz.org"
          git add src/data/news.json
          if git diff --staged --quiet; then
            echo "No news changes to commit."
          else
            git commit -m "chore(news): automated update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase origin main
            git push
          fi
