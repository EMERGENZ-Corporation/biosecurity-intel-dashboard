name: Official Source Audit

on:
  schedule:
    # Daily internal audit of Tier 1/2 source reachability and lastVerified age.
    - cron: '43 7 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/data/signal-sources.json'
      - 'scripts/audit-official-sources.mjs'
      - '.github/workflows/official-source-audit.yml'

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit Tier 1/2 source freshness
        id: audit-sources
        continue-on-error: true
        run: npm run audit:sources
        env:
          MAX_SOURCE_VERIFIED_AGE_DAYS: 30
          SOURCE_AUDIT_TIMEOUT_MS: 15000

      - name: Reconcile official source audit issue
        uses: actions/github-script@v8
        env:
          AUDIT_OUTCOME: ${{ steps.audit-sources.outcome }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs')
            const marker = '<!-- emergenz-official-source-audit -->'
            const title = '[SOURCE AUDIT] Official source registry needs review'
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const result = JSON.parse(fs.readFileSync('official-source-audit-result.json', 'utf8'))

            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'source-audit',
                color: 'D29922',
                description: 'Tier 1/2 source freshness or reachability alert',
              })
            } catch (error) {
              if (error.status !== 422) throw error
            }

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'source-audit',
              per_page: 20,
            })
            const existing = issues.find((issue) =>
              issue.title === title || issue.body?.includes(marker)
            )

            if (result.ok) {
              if (existing) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  body: [
                    'Official source audit recovered.',
                    `Checked at: \`${result.checkedAt}\``,
                    `Audited sources: ${result.sources?.audited ?? 'unknown'}`,
                    `Run: ${runUrl}`,
                  ].join('\n'),
                })
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  state: 'closed',
                })
              }
              return
            }

            const formatItems = (items) =>
              items?.length
                ? items.map((item) => `- ${item.id || 'unknown'} (${item.authority || 'unknown'}): ${item.reason}${item.url ? ` — ${item.url}` : ''}`).join('\n')
                : '- none recorded'

            const body = [
              marker,
              '## Official source registry audit alert',
              '',
              `Workflow outcome: \`${process.env.AUDIT_OUTCOME}\``,
              `Checked at: \`${result.checkedAt || 'unknown'}\``,
              `Audited Tier 1/2 sources: ${result.sources?.audited ?? 'unknown'}`,
              `Max lastVerified age: ${result.thresholds?.maxVerifiedAgeDays ?? 'unknown'} days`,
              '',
              '### Malformed source records',
              formatItems(result.malformedSources),
              '',
              '### Stale lastVerified dates',
              formatItems(result.staleSources),
              '',
              '### Unreachable source URLs',
              formatItems(result.unreachableSources),
              '',
              `Run: ${runUrl}`,
              '',
              '_Auto-generated by the EMERGENZ official source audit. This issue is reused to prevent alert spam. Diagnostics are internal and are not shown on the public dashboard._',
            ].join('\n')

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              })
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['source-audit'],
              })
            }

      - name: Fail workflow when official source audit fails
        if: steps.audit-sources.outcome != 'success'
        run: exit 1
