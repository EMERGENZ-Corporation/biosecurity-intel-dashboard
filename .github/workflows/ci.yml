name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-build:
    name: validate-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run validator regression tests
        run: npm run test:validators

      - name: Run NWSS ingestion transform tests
        run: npm run test:ingest-nwss

      - name: Run PHAC ingestion transform tests
        run: npm run test:ingest-phac

      - name: Run news-fetch retry tests
        run: npm run test:fetch

      - name: Run critical-gate quorum tests
        run: npm run test:gate

      - name: Audit autonomous update wiring
        run: npm run audit:autonomy

      - name: Audit AI and enrichment disclosure
        run: npm run audit:ai-enrichment

      - name: Validate signal data
        run: npm run validate:data

      - name: Build
        run: npm run build
