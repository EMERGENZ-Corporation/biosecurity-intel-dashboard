name: Ingest PHAC Host-City Wastewater

# Deterministic weekly ingestion of PHAC (Health Canada) wastewater viral
# activity levels into the Canadian host-city respiratory observations
# (Toronto, Vancouver). Counterpart to the NWSS (US) workflow; same hands-off
# discipline. See CONTENT-STANDARDS §4.8.

on:
  schedule:
    # Sunday 13:00 UTC — staggered a day after the NWSS (US) Saturday run so the
    # two writers don't race on host-city-biosurveillance.json (rebase-retry
    # below also tolerates it).
    - cron: '0 13 * * 0'
  workflow_dispatch:
    inputs:
      policy:
        description: 'Publish policy (auto = live, staged = review gate, off = kill switch)'
        required: false
        default: 'auto'
        type: choice
        options: [auto, staged, off]

concurrency:
  group: host-city-ingest
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      PHAC_PUBLISH_POLICY: ${{ github.event.inputs.policy || 'auto' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Ingest PHAC host-city observations
        run: npm run ingest:phac

      - name: Validate data
        run: npm run validate:data

      - name: Regenerate public status + API
        run: |
          npm run generate:status
          npm run generate:api

      - name: Commit updated host-city observations
        run: |
          git config user.name "EMERGENZ Data Bot"
          git config user.email "bot@emergenz.org"
          git add src/data/host-city-biosurveillance.json public/status.json public/api/v1/
          if git diff --staged --quiet; then
            echo "No host-city changes to commit."
            exit 0
          fi
          git commit -m "chore(host-cities): PHAC wastewater refresh $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          pushed=false
          for attempt in 1 2 3 4 5; do
            git pull --rebase -X theirs origin main || {
              echo "Rebase conflict on attempt $attempt — aborting."
              git rebase --abort 2>/dev/null || true
              exit 1
            }
            node scripts/generate-status.mjs
            node scripts/generate-api.mjs
            git add public/status.json public/api/v1/
            git diff --staged --quiet || git commit --amend --no-edit
            if git push; then
              pushed=true
              echo "Push succeeded on attempt $attempt."
              break
            fi
            echo "Push rejected (attempt $attempt/5). Retrying in $((attempt * 3))s..."
            sleep $((attempt * 3))
          done
          if [ "$pushed" != "true" ]; then
            echo "::error::Failed to push PHAC host-city refresh after 5 attempts."
            exit 1
          fi
